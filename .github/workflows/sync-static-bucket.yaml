name: sync static bucket

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: sync-fluxer-static
  cancel-in-progress: true

jobs:
  push:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
    env:
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      RCLONE_BUCKET: fluxer-static
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Install rclone
        run: |
          if ! command -v rclone >/dev/null 2>&1; then
            curl -fsSL https://rclone.org/install.sh | sudo bash
          fi

      - name: Configure rclone for Vultr Object Storage
        run: |
          mkdir -p ~/.config/rclone
          cat > ~/.config/rclone/rclone.conf << 'RCLONEEOF'
          [vultrobjects]
          type = s3
          provider = Other
          env_auth = true
          endpoint = https://ewr1.vultrobjects.com
          acl = public-read
          RCLONEEOF

      - name: Sync repository to Vultr bucket
        run: |
          rclone sync . "vultrobjects:${RCLONE_BUCKET}" \
            --create-empty-src-dirs \
            --exclude ".git/**" \
            --exclude ".github/**" \
            --exclude "assets/**" \
            --transfers 32 \
            --checkers 10 \
            --fast-list \
            --s3-upload-concurrency 8 \
            --s3-chunk-size 32M \
            -v
